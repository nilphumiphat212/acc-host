  <style>
    /* Loading Screen Styles */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    .loading-logo svg {
      width: 40px;
      height: 40px;
      fill: white;
    }

    .loading-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 48px;
      font-weight: 800;
      color: white;
      letter-spacing: -2px;
      margin-bottom: 8px;
    }

    .loading-subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 48px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 24px;
    }

    /* Feature highlights */
    .feature-container {
      position: absolute;
      bottom: 80px;
      left: 0;
      right: 0;
      text-align: center;
      height: 60px;
    }

    .feature-item {
      position: absolute;
      left: 0;
      right: 0;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .feature-item.active {
      opacity: 1;
      transform: translateY(0);
    }

    .feature-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      margin-right: 12px;
      vertical-align: middle;
    }

    .feature-icon svg {
      width: 18px;
      height: 18px;
      fill: #a5b4fc;
    }

    .feature-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      vertical-align: middle;
    }

    .feature-highlight {
      color: #a5b4fc;
      font-weight: 600;
    }

    /* Progress dots */
    .progress-dots {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .progress-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .progress-dot.active {
      background: #6366f1;
      width: 20px;
      border-radius: 3px;
    }

    /* Gradient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #6366f1 0%, transparent 70%);
      top: -100px;
      left: -100px;
    }

    .orb-2 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
      top: 100px;
      right: -50px;
    }

    .orb-3 {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
      bottom: 50px;
      left: 20%;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Feature rotation
    var currentFeature = 0;
    var totalFeatures = 6;
    var featureInterval;

    function rotateFeature() {
      var items = document.querySelectorAll('.feature-item');
      var dots = document.querySelectorAll('.progress-dot');
      
      // Remove active class from current
      items[currentFeature].classList.remove('active');
      dots[currentFeature].classList.remove('active');
      
      // Move to next
      currentFeature = (currentFeature + 1) % totalFeatures;
      
      // Add active class to new
      items[currentFeature].classList.add('active');
      dots[currentFeature].classList.add('active');
    }

    // Start rotation
    featureInterval = setInterval(rotateFeature, 3000);

    // Version check for cache busting
    var currentVersion = null;
    var versionCheckInterval;

    function checkVersion() {
      fetch(window.location.href, { 
        method: 'HEAD',
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache' }
      })
        .then(function(response) {
          var newVersion = response.headers.get('ETag') || response.headers.get('Last-Modified');
          if (currentVersion === null) {
            currentVersion = newVersion;
          } else if (newVersion && newVersion !== currentVersion) {
            // New version detected - prompt user to refresh
            console.log('New version detected, refreshing...');
            clearInterval(featureInterval);
            clearInterval(versionCheckInterval);
            window.location.reload(true);
          }
        })
        .catch(function(err) {
          console.log('Version check failed:', err);
        });
    }

    // Check version every 30 seconds
    versionCheckInterval = setInterval(checkVersion, 30000);
    // Initial check
    checkVersion();

    // Hide loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      clearInterval(featureInterval);
      var loadingScreen = document.getElementById('loading-screen');
      loadingScreen.classList.add('fade-out');
      setTimeout(function() {
        loadingScreen.remove();
      }, 500);
    });
  </script>
